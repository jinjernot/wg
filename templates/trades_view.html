<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Trades - WillGang</title>
    <link rel="icon" href="{{ url_for('static', filename='ss.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* ── Trades-view local styles ─────────────────────────── */
        .stat-card-icon {
            font-size: 1.2rem;
            margin-bottom: 4px;
            display: block;
            opacity: 0.6;
        }
        .stat-cards-grid {
            grid-template-columns: repeat(6, 1fr);
        }
        @media (max-width: 900px) {
            .stat-cards-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 540px) {
            .stat-cards-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .kpi-amount {
            font-size: 1.45rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(135deg, #FBBF24, #F59E0B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            margin-bottom: 4px;
        }

        /* Status pills */
        .trade-status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .pill-active  { background: rgba(99,102,241,0.18); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.35); }
        .pill-paid    { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
        .pill-dispute { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .pill-warn    { background: rgba(251,146,60,0.15); color: #FB923C; border: 1px solid rgba(251,146,60,0.3); }
        .pill-default { background: rgba(255,255,255,0.07); color: var(--text-2); border: 1px solid var(--border); }

        /* Live dot */
        .live-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
            animation: ldPulse 2s ease-in-out infinite;
        }
        .ld-indigo { background: #818cf8; }
        .ld-green  { background: #4ade80; }
        .ld-red    { background: #f87171; }
        .ld-amber  { background: #FBBF24; }
        @keyframes ldPulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:0.4; transform:scale(0.65); }
        }

        /* Hash chip */
        .hash-chip {
            font-family: monospace;
            font-size: 0.78rem;
            color: var(--text-2);
            background: rgba(0,0,0,0.25);
            padding: 3px 8px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all var(--ease);
            user-select: none;
            display: inline-block;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            vertical-align: middle;
        }
        .hash-chip:hover { border-color: var(--border-hover); color: var(--text-1); background: rgba(99,102,241,0.1); }
        .hash-chip.copied { color: var(--green); border-color: rgba(34,197,94,0.4); }

        /* Buyer chip */
        .buyer-chip { display: inline-flex; align-items: center; gap: 5px; }
        .buyer-avatar {
            width: 22px; height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--indigo), var(--violet));
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 700; color: #fff; flex-shrink: 0;
        }

        /* Age badge */
        .age-badge { font-size: 0.72rem; color: var(--text-3); font-variant-numeric: tabular-nums; white-space: nowrap; }
        .age-warn { color: var(--amber); }
        .age-old  { color: var(--red); }

        /* Countdown ring */
        .refresh-area { display: flex; align-items: center; gap: 10px; }
        .countdown-ring { position: relative; width: 28px; height: 28px; flex-shrink: 0; }
        .countdown-ring svg { transform: rotate(-90deg); display: block; }
        .countdown-ring circle { fill: none; stroke-width: 3; }
        .ring-bg  { stroke: rgba(255,255,255,0.08); }
        .ring-arc { stroke: var(--indigo); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
        .countdown-label {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.58rem; font-weight: 700; color: var(--text-2);
            font-variant-numeric: tabular-nums;
        }

        /* Empty state */
        .tv-empty { padding: 60px 24px; text-align: center; }
        .tv-empty-icon { font-size: 3rem; display: block; margin-bottom: 12px; opacity: 0.3; }
        .tv-empty h3 { font-size: 1rem; color: var(--text-2); font-weight: 600; margin-bottom: 6px; }
        .tv-empty p  { font-size: 0.82rem; color: var(--text-3); }

        /* Header live indicator */
        .header-live {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.72rem; color: var(--text-3);
            margin-left: 12px;
        }
        .header-live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: ldPulse 2s ease-in-out infinite; }
    </style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<div class="header">
    <div class="logo">
        <img src="{{ url_for('static', filename='ss.png') }}" alt="Logo" class="logo-img">
    </div>
    <h1>Active Trades</h1>
    <div class="header-live" id="header-live" style="display:none;">
        <span class="header-live-dot"></span>
        <span id="header-live-text"></span>
    </div>
    <div style="margin-left:auto;">
        <a href="/" class="nav-btn">← Dashboard</a>
    </div>
</div>

<div class="trades-view-container">

    <!-- Stat Cards -->
    <div class="stat-cards-grid" style="margin-bottom:20px;">
        <div class="stat-card">
            <span class="stat-card-icon">📋</span>
            <div class="stat-card-value" id="stat-total">—</div>
            <div class="stat-card-label">Total</div>
        </div>
        <div class="stat-card">
            <span class="stat-card-icon">✅</span>
            <div class="stat-card-value green" id="stat-paid">—</div>
            <div class="stat-card-label">Paid</div>
        </div>
        <div class="stat-card">
            <span class="stat-card-icon">📎</span>
            <div class="stat-card-value" style="background:linear-gradient(135deg,#ea580c,#FB923C);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;" id="stat-noreceipt">—</div>
            <div class="stat-card-label">No Receipt</div>
        </div>
        <div class="stat-card">
            <span class="stat-card-icon">⚠️</span>
            <div class="stat-card-value yellow" id="stat-disputed">—</div>
            <div class="stat-card-label">Disputed</div>
        </div>
        <div class="stat-card">
            <span class="stat-card-icon">⚡</span>
            <div class="stat-card-value" id="stat-active">—</div>
            <div class="stat-card-label">Active</div>
        </div>
        <div class="stat-card">
            <span class="stat-card-icon">💰</span>
            <div class="kpi-amount" id="stat-exposure">—</div>
            <div class="stat-card-label">MXN Exposure</div>
        </div>
    </div>

    <!-- Trades Card -->
    <div class="card">
        <div class="trades-card-header">
            <h2>⚡ Active Trades</h2>
            <div class="refresh-area">
                <div class="countdown-ring" title="Next auto-refresh">
                    <svg width="28" height="28" viewBox="0 0 28 28">
                        <circle class="ring-bg" cx="14" cy="14" r="11"/>
                        <circle class="ring-arc" id="ring-arc" cx="14" cy="14" r="11"
                                stroke-dasharray="69.12" stroke-dashoffset="0"/>
                    </svg>
                    <span class="countdown-label" id="countdown-label">30</span>
                </div>
                <button class="refresh-btn" id="tv-refresh-btn">⟳ Refresh</button>
            </div>
        </div>
        <div id="active-trades-container">
            <div class="skeleton skeleton-card"></div>
        </div>
    </div>

</div>

<script>
// ── Toast ─────────────────────────────────────────────────────────
function showToast(title, message, type = 'info') {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<div class="toast-icon">${icons[type]||icons.info}</div>
        <div class="toast-content">
            <div class="toast-title">${title}</div>
            <div class="toast-message">${message}</div>
        </div>`;
    container.appendChild(toast);
    setTimeout(() => { toast.classList.add('removing'); setTimeout(() => toast.remove(), 300); }, 4000);
}

// ── Release Modal ─────────────────────────────────────────────────
function showReleaseModal({ tradeHash, accountName, buyer, amount, hasAttachment }) {
    return new Promise(resolve => {
        const existing = document.getElementById('release-modal-overlay');
        if (existing) existing.remove();
        const noProof = !hasAttachment;
        const overlay = document.createElement('div');
        overlay.id = 'release-modal-overlay';
        overlay.innerHTML = `
            <div class="release-modal">
                <div class="release-modal-header ${noProof ? 'danger' : ''}">
                    <span class="release-modal-icon">${noProof ? '⚠️' : '🔒'}</span>
                    <h3>${noProof ? 'WARNING — No Proof Uploaded' : 'Confirm Trade Release'}</h3>
                </div>
                <div class="release-modal-body">
                    <div class="release-modal-row"><span>Trade</span><code>${tradeHash}</code></div>
                    <div class="release-modal-row"><span>Buyer</span><strong>${buyer||'N/A'}</strong></div>
                    <div class="release-modal-row"><span>Amount</span><strong>${amount||'N/A'}</strong></div>
                    ${noProof
                        ? `<p class="release-modal-warning">🚨 No receipt uploaded. Release without verifying proof?</p>`
                        : `<p class="release-modal-ok">✅ Receipt uploaded. Confirm release below.</p>`}
                </div>
                <div class="release-modal-footer">
                    <button class="release-modal-cancel">Cancel</button>
                    <button class="release-modal-confirm ${noProof ? 'danger' : ''}">Confirm Release</button>
                </div>
            </div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('.release-modal-cancel').addEventListener('click', () => { overlay.remove(); resolve(false); });
        overlay.querySelector('.release-modal-confirm').addEventListener('click', () => { overlay.remove(); resolve(true); });
        overlay.addEventListener('click', e => { if (e.target === overlay) { overlay.remove(); resolve(false); } });
    });
}

// ── Helpers ───────────────────────────────────────────────────────
function fmtAge(isoStr) {
    if (!isoStr) return null;
    const s = Math.floor((Date.now() - new Date(isoStr)) / 1000);
    if (s < 60) return { text: `${s}s`, cls: '' };
    const m = Math.floor(s / 60);
    if (m < 60) return { text: `${m}m`, cls: m > 30 ? 'age-warn' : '' };
    const h = Math.floor(m / 60);
    return { text: `${h}h ${m % 60}m`, cls: 'age-old' };
}

function animateCount(el, target) {
    if (!el) return;
    const start = performance.now();
    const step = now => {
        const p = Math.min((now - start) / 500, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(target * ease).toLocaleString();
        if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
}

function copyHash(el, full) {
    navigator.clipboard.writeText(full).then(() => {
        el.classList.add('copied');
        el.textContent = 'Copied!';
        setTimeout(() => { el.classList.remove('copied'); el.textContent = full.slice(0,10)+'…'; }, 1500);
    });
}

function statusPill(trade) {
    const s = trade.trade_status || '';
    if (s === 'Paid' && !trade.has_attachment)
        return `<span class="trade-status-pill pill-warn"><span class="live-dot ld-amber"></span>No Receipt</span>`;
    if (s === 'Paid')
        return `<span class="trade-status-pill pill-paid"><span class="live-dot ld-green"></span>Paid</span>`;
    if (s === 'Dispute open')
        return `<span class="trade-status-pill pill-dispute"><span class="live-dot ld-red"></span>Disputed</span>`;
    if (s)
        return `<span class="trade-status-pill pill-active"><span class="live-dot ld-indigo"></span>${s}</span>`;
    return `<span class="trade-status-pill pill-default">N/A</span>`;
}

// ── Countdown Ring ────────────────────────────────────────────────
const REFRESH_SEC = 30;
const CIRC = 2 * Math.PI * 11;
let cdSec = REFRESH_SEC, cdTimer = null;

function startCountdown() {
    if (cdTimer) clearInterval(cdTimer);
    cdSec = REFRESH_SEC;
    _updateRing();
    cdTimer = setInterval(() => { cdSec = cdSec > 0 ? cdSec - 1 : REFRESH_SEC; _updateRing(); }, 1000);
}
function _updateRing() {
    const arc = document.getElementById('ring-arc');
    const lbl = document.getElementById('countdown-label');
    if (arc) {
        arc.style.strokeDashoffset = CIRC * (1 - cdSec / REFRESH_SEC);
        arc.style.stroke = cdSec <= 5 ? 'var(--amber)' : 'var(--indigo)';
    }
    if (lbl) lbl.textContent = cdSec;
}

// ── Last-updated counter ──────────────────────────────────────────
let _luTimer = null, _luStart = null;
function startLuCounter(el) {
    if (_luTimer) clearInterval(_luTimer);
    _luStart = Date.now();
    _luTimer = setInterval(() => {
        const s = Math.floor((Date.now() - _luStart) / 1000);
        if (el) el.textContent = s < 60 ? `Last updated: ${s}s ago` : `Last updated: ${Math.floor(s/60)}m ${s%60}s ago`;
    }, 1000);
}

// ── Age ticker ────────────────────────────────────────────────────
let _ageTicker = null, _ageRegistry = [];
function startAgeTicker() {
    if (_ageTicker) clearInterval(_ageTicker);
    _ageTicker = setInterval(() => {
        _ageRegistry.forEach(({ id, iso }) => {
            const el = document.getElementById(id);
            const info = fmtAge(iso);
            if (el && info) { el.textContent = info.text; el.className = `age-badge ${info.cls}`; }
        });
    }, 10000);
}

// ── Table renderer ────────────────────────────────────────────────
function renderTradesTable(trades) {
    const container = document.getElementById('active-trades-container');
    if (!container) return;
    container.innerHTML = '';

    if (!trades || trades.length === 0) {
        container.innerHTML = `<div class="tv-empty">
            <span class="tv-empty-icon">📭</span>
            <h3>No Active Trades</h3>
            <p>Everything's quiet right now.</p>
        </div>`;
        return;
    }

    // Last-updated row
    const hdr = document.createElement('div');
    hdr.className = 'trades-table-header';
    const lu = document.createElement('span');
    lu.className = 'trades-last-updated';
    lu.textContent = 'Last updated: just now';
    hdr.appendChild(lu);
    container.appendChild(hdr);
    startLuCounter(lu);

    _ageRegistry = [];

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr>
        <th>Account</th><th>Trade Hash</th><th>Buyer</th>
        <th>Amount</th><th>Method</th><th>Status</th><th>Age</th><th>Actions</th>
    </tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');

    trades.forEach(trade => {
        const row = document.createElement('tr');
        const isNew = trade.started_at
            ? (Date.now() - new Date(trade.started_at)) / 60000 <= 30 : false;
        const isOldPaid = trade.trade_status === 'Paid' && trade.started_at
            ? (Date.now() - new Date(trade.started_at)) / 3600000 > 3 : false;
        const noReceipt = trade.trade_status === 'Paid' && !trade.has_attachment;
        const amountStr = `${trade.fiat_amount_requested || 'N/A'} ${trade.fiat_currency_code || ''}`.trim();
        const ageInfo = fmtAge(trade.started_at);
        const ageId = `age-${trade.trade_hash}`;
        const hashShort = (trade.trade_hash || '').slice(0, 10) + '…';
        const initial = (trade.responder_username || '?').charAt(0).toUpperCase();

        row.innerHTML = `
            <td style="font-weight:600;font-size:0.82rem;">${trade.account_name_source || 'N/A'}</td>
            <td><span class="hash-chip" title="${trade.trade_hash||''}" data-full="${trade.trade_hash||''}">${hashShort}</span></td>
            <td><span class="buyer-chip"><span class="buyer-avatar">${initial}</span><span style="font-size:0.82rem;">${trade.responder_username||'N/A'}</span></span></td>
            <td style="font-weight:600;">${amountStr}</td>
            <td style="color:var(--text-2);font-size:0.82rem;">${trade.payment_method_name||'N/A'}</td>
            <td>${statusPill(trade)}</td>
            <td><span id="${ageId}" class="age-badge ${ageInfo?ageInfo.cls:''}">${ageInfo?ageInfo.text:'—'}</span></td>
            <td class="message-cell">
                <input type="text" class="manual-message-input" placeholder="Type a message…">
                <button class="send-manual-message-btn"
                    data-trade-hash="${trade.trade_hash}"
                    data-account-name="${trade.account_name_source}">Send</button>
                <button class="release-trade-btn"
                    data-trade-hash="${trade.trade_hash}"
                    data-account-name="${trade.account_name_source}"
                    data-buyer="${trade.responder_username||''}"
                    data-amount="${amountStr}"
                    data-has-attachment="${trade.has_attachment?'true':'false'}">Release</button>
            </td>`;

        // Row colour
        if (isNew && trade.trade_status !== 'Paid' && trade.trade_status !== 'Dispute open')
            row.classList.add('status-new');
        else if (noReceipt)    row.classList.add('status-paid-no-attachment');
        else if (trade.trade_status === 'Paid' && trade.has_attachment && isOldPaid) row.classList.add('status-paid-old');
        else if (trade.trade_status === 'Paid')          row.classList.add('status-paid');
        else if (trade.trade_status === 'Dispute open')  row.classList.add('status-disputed');

        // High-value
        const amt = parseFloat(trade.fiat_amount_requested);
        if (!isNaN(amt) && amt > 3000 && (trade.fiat_currency_code||'').toUpperCase() === 'MXN')
            row.classList.add('high-value');

        if (trade.started_at) _ageRegistry.push({ id: ageId, iso: trade.started_at });
        tbody.appendChild(row);
    });

    container.appendChild(table);
    startAgeTicker();

    // Hash copy clicks
    container.querySelectorAll('.hash-chip').forEach(chip => {
        chip.addEventListener('click', () => copyHash(chip, chip.dataset.full));
    });

    // Send / Release delegation
    container.addEventListener('click', async e => {
        if (e.target.classList.contains('send-manual-message-btn')) {
            const btn = e.target;
            const input = btn.previousElementSibling;
            const message = input.value.trim();
            if (!message) { showToast('Missing Message', 'Please type a message.', 'warning'); return; }
            btn.disabled = true; btn.textContent = '…';
            try {
                const res = await fetch('/send_manual_message', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ trade_hash: btn.dataset.tradeHash, account_name: btn.dataset.accountName, message })
                });
                const r = await res.json();
                r.success ? (showToast('Sent ✅', r.message, 'success'), input.value='') : showToast('Error', r.error, 'error');
            } catch { showToast('Error', 'Unexpected error.', 'error'); }
            finally { btn.disabled=false; btn.textContent='Send'; }
        }
        if (e.target.classList.contains('release-trade-btn')) {
            const btn = e.target;
            const confirmed = await showReleaseModal({
                tradeHash: btn.dataset.tradeHash, accountName: btn.dataset.accountName,
                buyer: btn.dataset.buyer, amount: btn.dataset.amount,
                hasAttachment: btn.dataset.hasAttachment === 'true'
            });
            if (!confirmed) return;
            btn.disabled=true; btn.textContent='…';
            try {
                const res = await fetch('/release_trade', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ trade_hash: btn.dataset.tradeHash, account_name: btn.dataset.accountName })
                });
                const r = await res.json();
                r.success ? (showToast('Released 🎉', r.message, 'success'), loadTrades()) : showToast('Error', r.error, 'error');
            } catch { showToast('Error', 'Unexpected error.', 'error'); }
            finally { btn.disabled=false; btn.textContent='Release'; }
        }
    });
}

// ── Main load ─────────────────────────────────────────────────────
async function loadTrades() {
    const btn = document.getElementById('tv-refresh-btn');
    if (btn) { btn.disabled=true; btn.textContent='⟳ Loading…'; }
    try {
        const res = await fetch('/get_active_trades');
        const trades = await res.json();

        const total    = trades.length;
        const paid     = trades.filter(t => t.trade_status === 'Paid').length;
        const noRcpt   = trades.filter(t => t.trade_status === 'Paid' && !t.has_attachment).length;
        const disputed = trades.filter(t => t.trade_status === 'Dispute open').length;
        const active   = trades.filter(t => t.trade_status !== 'Paid' && t.trade_status !== 'Dispute open').length;
        const exposure = trades.reduce((s, t) => {
            const a = parseFloat(t.fiat_amount_requested);
            return (t.fiat_currency_code||'').toUpperCase() === 'MXN' && !isNaN(a) ? s + a : s;
        }, 0);

        animateCount(document.getElementById('stat-total'),    total);
        animateCount(document.getElementById('stat-paid'),     paid);
        animateCount(document.getElementById('stat-noreceipt'),noRcpt);
        animateCount(document.getElementById('stat-disputed'), disputed);
        animateCount(document.getElementById('stat-active'),   active);

        const expEl = document.getElementById('stat-exposure');
        if (expEl) expEl.textContent = exposure > 0
            ? '$' + exposure.toLocaleString('en-US', {maximumFractionDigits:0}) + ' MXN' : '—';

        const live = document.getElementById('header-live');
        const liveTxt = document.getElementById('header-live-text');
        if (live) live.style.display = 'flex';
        if (liveTxt) liveTxt.textContent = `${total} trade${total!==1?'s':''} live`;

        renderTradesTable(trades);
        startCountdown();
    } catch(err) {
        console.error(err);
        showToast('Error', 'Failed to load trades.', 'error');
    } finally {
        if (btn) { btn.disabled=false; btn.textContent='⟳ Refresh'; }
    }
}

document.getElementById('tv-refresh-btn').addEventListener('click', loadTrades);
loadTrades();
setInterval(loadTrades, REFRESH_SEC * 1000);
</script>
</body>
</html>
